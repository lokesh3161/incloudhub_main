<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1st Year Data Structures - InCloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        #header-wrapper, .header-outer, .footer-outer, .tabs-outer,
        .sidebar-wrapper, .post-footer, #blog-pager, .comments,
        .main-inner, .column-right-outer, .column-left-outer {
            display: none !important;
        }

        body {
            margin: 0 !important;
            padding: 0 !important;
            background: #121212 !important;
            overflow: hidden !important;
        }

        #incloud-ds-portal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow-y: auto;
            background: linear-gradient(135deg, #1f1f1f 0%, #121212 100%);
            z-index: 999999;
            font-family: 'Poppins', sans-serif;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4rem 1.5rem;
            box-sizing: border-box;
        }

        #incloud-ds-portal::-webkit-scrollbar { width: 6px; }
        #incloud-ds-portal::-webkit-scrollbar-track { background: #1a1a1a; }
        #incloud-ds-portal::-webkit-scrollbar-thumb { background: #F78C25; border-radius: 10px; }

        .logo {
            font-size: clamp(2.5rem, 8vw, 3.8rem);
            font-weight: 700;
            color: #F78C25;
            text-align: center;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 25px rgba(247, 140, 37, 0.3);
        }

        .tagline {
            font-size: 1.1rem;
            font-weight: 300;
            text-align: center;
            margin-bottom: 3rem;
            color: #aaaaaa;
        }

        .content-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 800px;
            border: 1px solid rgba(255, 215, 0, 0.05);
            text-align: center;
        }

        .content-container h2 {
            color: #ffffff;
            font-weight: 600;
            margin-bottom: 2rem;
            font-size: 1.8rem;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        a.note-link {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(45, 45, 45, 0.6);
            padding: 18px 25px;
            border-radius: 16px;
            color: #F78C25;
            text-decoration: none;
            font-weight: 600;
            border: 1px solid rgba(247, 140, 37, 0.1);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        a.note-link:hover {
            background: #F78C25;
            color: #ffffff;
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(247, 140, 37, 0.4);
            border-color: #F78C25;
        }

        .incloud-footer {
            margin-top: auto;
            padding: 2.5rem 1rem;
            text-align: center;
            font-size: 0.9rem;
            color: #666666;
        }

        .incloud-footer b { color: #F78C25; }

        @media (max-width: 768px) {
            .logo { font-size: 2.8rem; }
            .content-container { padding: 1.8rem; }
        }
    </style>
</head>
<body>

<div id="incloud-ds-portal">

    <div class="logo">InCloudHub</div>
    <div class="tagline">Your Central Hub for Resources ☁️</div>

    <div class="content-container">
        <h2>📘 Choose the file you want</h2>
        <ul></ul>
    </div>

    <div class="incloud-footer">
        © 2026 <b>InCloud</b> | Designed by Lokesh Thanala 🚀
    </div>

</div>

<script src="notes-client.js"></script>
<script>
window.onload = function() {
    var brs = document.getElementsByTagName('br');
    for (var i = brs.length - 1; i >= 0; i--) { brs[i].parentNode.removeChild(brs[i]); }
    loadDynamicNotes('1styeardatastructures');
};
</script>

</body>
</html>
